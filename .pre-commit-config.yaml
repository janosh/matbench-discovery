default_stages: [pre-commit]

default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.55
    hooks:
      - id: ty
        # --isolated: don't create/update uv.lock or the local .venv
        # --extra test: make pytest and phonon deps resolvable by ty
        args: [--isolated, --extra, test]
        env: { UV_FROZEN: "0" } # prek-only: override global UV_FROZEN=1 which would require a uv.lock

  - repo: https://github.com/janosh/format-ipy-cells
    rev: v0.1.11
    hooks:
      - id: format-ipy-cells

  - repo: builtin
    hooks:
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: destroyed-symlinks
      - id: check-vcs-permalinks

  - repo: local
    hooks:
      - id: vp-fmt
        name: Format (oxfmt)
        entry: bash -c 'cd site && node_modules/.bin/vp fmt --write'
        types_or: [ts, javascript, json, css, html, svelte]
        language: system
        pass_filenames: false
      - id: vp-lint
        name: Lint (oxlint)
        entry: bash -c 'cd site && node_modules/.bin/vp lint --fix'
        types_or: [ts, javascript, json, css, html, svelte]
        language: system
        pass_filenames: false
      - id: svelte-check
        name: Svelte type check
        entry: bash -c 'cd site && node_modules/.bin/svelte-kit sync && node_modules/.bin/svelte-check-rs --threshold error'
        language: system
        types_or: [ts, svelte]
        pass_filenames: false

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        stages: [pre-commit, commit-msg]
        exclude_types: [csv, json, svg, bib]
        exclude: ^pyproject\.toml$
        args: [--check-filenames]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        # MD013: line too long
        # MD033: no inline HTML
        # MD041: first line in a file should be a top-level heading
        # MD034: no bare urls
        args: [--disable, MD013, MD033, MD034, MD041, "--"]
        exclude: changelog\.md$

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.3
    hooks:
      - id: check-jsonschema
        name: check-jsonschema-models
        files: ^models/.+/.+\.yml$
        args: [--schemafile, tests/model-schema.yml]
      - id: check-jsonschema
        name: check-jsonschema-datasets
        files: ^data/datasets\.yml$
        args: [--schemafile, tests/dataset-schema.yml]
      - id: check-github-actions

  - repo: https://github.com/crate-ci/typos
    rev: v1.47.2
    hooks:
      - id: typos
        stages: [pre-commit, commit-msg]
        args: [--force-exclude]
