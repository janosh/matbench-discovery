name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      task:
        type: choice
        options: [tests, release]
        default: tests
        description: Only run tests or release a new version of pymatgen to PyPI after tests pass.
  workflow_call:

# least-privilege default for GITHUB_TOKEN; all jobs here only read the repo
permissions:
  contents: read

concurrency:
  # Cancel only on same PR number
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pytest:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    uses: janosh/workflows/.github/workflows/pytest.yml@main
    with:
      os: ${{ matrix.os }}
      python-version: "3.11"
      install-cmd: uv pip install -e .[test,symmetry] --system

  vitest:
    defaults:
      run:
        working-directory: site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        # use the project's pinned pnpm (packageManager field) via corepack
        run: corepack enable && pnpm install

      - name: Run unit tests
        run: pnpm test

  scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.12"

      # same cache as update-site-figs.yml: scripts/evals/discovery.py downloads
      # every active model's WBM predictions, several GB on a cold cache
      - name: Cache model prediction + analysis files
        uses: actions/cache@v5
        with:
          path: |
            models/**/*.csv.gz
            models/**/*.json.gz
            data/mp
            data/wbm
          key: model-preds-${{ hashFiles('models/**/*.yml') }}
          restore-keys: model-preds-

      - name: Run discovery eval script
        run: uv run --with-editable . python scripts/evals/discovery.py
