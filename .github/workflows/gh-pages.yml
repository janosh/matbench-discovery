name: GitHub Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    defaults:
      run:
        working-directory: site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        # use the project's pinned pnpm (packageManager field) via corepack
        run: corepack enable && pnpm install

      - name: Download energy parity assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p static/energy-parity/assets
          gh release download v1.0.0 \
            --repo janosh/matbench-discovery \
            --pattern 'energy-parity-wbm-v1-*.json.gz' \
            --dir static/energy-parity/assets \
            --clobber
          compgen -G 'static/energy-parity/assets/energy-parity-wbm-v1-*.json.gz' > /dev/null \
            || { echo '::error::No energy parity assets in release v1.0.0'; exit 1; }

      - name: Download kappa parity assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p static/kappa-parity/assets
          gh release download v1.0.0 \
            --repo janosh/matbench-discovery \
            --pattern 'kappa-parity-phonondb-v1-*.json.gz' \
            --dir static/kappa-parity/assets \
            --clobber
          compgen -G 'static/kappa-parity/assets/kappa-parity-phonondb-v1-*.json.gz' > /dev/null \
            || { echo '::error::No kappa parity assets in release v1.0.0'; exit 1; }

      - name: Build site
        run: |
          uv run --with-editable .. ../scripts/make_api_docs.py
          pnpm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/build

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
