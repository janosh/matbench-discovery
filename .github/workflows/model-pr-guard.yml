name: Model PR guard

# Block merging PRs that would leave committed site assets stale. Two guards:
#
# 1. Un-ingested model submissions: tests/site/test_parity_assets.py requires every active
#    model with predictions to be in the committed parity manifests and every manifest
#    asset to exist in the GitHub release the site downloads from. Model PRs fail until
#    a maintainer applies the 'ingest-model' label (full CI ingest via
#    update-site-figs.yml, whose result commit re-triggers this check) or runs
#    `uv run --with-editable . scripts/ingest_model.py <model> --archive` locally.
# 2. Payload-format changes without regenerated payloads: stale-format payloads would
#    ship to the site unnoticed (shape tests assert the tests' expectations, not the
#    generators'; a CI regen-and-compare would be too slow and not byte-reproducible,
#    hence this cheap diff-consistency check). Regenerate locally with
#    `scripts/ingest_model.py --payloads-only`, or apply the 'payloads-unchanged'
#    label for output-neutral refactors. Label edits re-run this whole job (types
#    below) - the redundant ~1 min parity re-run is intentional: skipping it on label
#    events would post a 'skipped' check run that masks its last real result in
#    branch protection (newest check run of a name wins, skipped counts as passing).
#
# Runs on ALL PRs (a path-filtered required check would block non-model PRs
# forever); non-model PRs pass in ~1 min. Also runs on main pushes + weekly to catch
# drift (e.g. release assets deleted post-merge).

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  push:
    branches: [main]
  schedule:
    - cron: 41 4 * * 1 # weekly drift check (Mon 04:41 UTC)
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read # list PR changed files in the payload-consistency check

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  model-pr-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.12"

      # guard 2 (see header). GEN = generators/writers whose edits alter payload
      # output. PAYLOADS = generated data artifacts only (payloads.d.ts edits alone
      # don't satisfy). The data/mp and data/wbm EDA/compile scripts no longer write
      # site payloads directly and are intentionally excluded.
      - name: Require payload updates when payload-shaping code changes
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'payloads-unchanged')
        env:
          CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if (( CHANGED_FILES > 3000 )); then
            echo "::error::PR has $CHANGED_FILES changed files; GitHub's API exposes at most 3000."
            exit 1
          fi
          gh api --paginate --slurp \
            "repos/$GITHUB_REPOSITORY/pulls/$PR/files" \
            > "$RUNNER_TEMP/pr-files.json"
          RETURNED_FILES=$(jq '[.[][]] | length' "$RUNNER_TEMP/pr-files.json")
          if (( RETURNED_FILES != CHANGED_FILES )); then
            echo "::error::GitHub returned $RETURNED_FILES of $CHANGED_FILES changed files."
            exit 1
          fi
          CHANGED=$(jq -r '.[][] | .filename' "$RUNNER_TEMP/pr-files.json")
          GENERATOR_PATTERN=$(<.github/payload-generator-paths.regex)
          [ -z "$GENERATOR_PATTERN" ] && { echo "::error::Empty generator pattern"; exit 1; }
          GEN=$(grep -E "$GENERATOR_PATTERN" <<< "$CHANGED" || true)
          PAYLOADS=$(grep -E '^(site/src/figs/.*\.(jsonl|json\.gz)|site/src/routes/(data/.*\.json|models/per-element-each-errors\.jsonl)|site/src/lib/diatomics-dft\.json\.gz)$' <<< "$CHANGED" || true)
          if [ -n "$GEN" ] && [ -z "$PAYLOADS" ]; then
            echo "::error::PR changes payload-generating code ($(tr '\n' ' ' <<< "$GEN")) but no committed generated payloads (site/src/figs data files, route-local JSON, models/per-element-each-errors.jsonl, or diatomics-dft.json.gz). Regenerate the affected payloads locally, or apply the 'payloads-unchanged' label if output is provably unchanged."
            exit 1
          fi

      - name: Check parity manifests + release assets
        env:
          GH_TOKEN: ${{ github.token }} # avoids GitHub API rate limits
        run: uv run --with-editable . --with pytest pytest tests/site/test_parity_assets.py -q
