name: Update site figures

# Ingest a model submission after a maintainer applies the `ingest-model` label.
# The workflow runs trusted base code, overlays only validated PR data, archives the
# submitted files, regenerates site assets and pushes one commit onto the PR branch.
#
# SECURITY: this secret-bearing workflow never executes PR code. PRs that change
# payload-generating code must regenerate and commit payloads locally; they fail here
# before archival or push credentials are exposed.
on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write # upload parity assets to the release
  pull-requests: read # inspect the PR diff

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  update-site-figs:
    if: github.event.label.name == 'ingest-model'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Check out trusted repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Pinned to the SHA reviewed when the label event fired. The live-head check
      # below and final non-forced push reject later force-pushes.
      - name: Check out submission PR head (data only)
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-tree
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.12"

      - name: Cache stable site input data
        uses: actions/cache@v5
        with:
          path: |
            data/mp
            data/wbm
          key: site-input-data-${{ runner.os }}-${{ hashFiles('matbench_discovery/enums.py', 'matbench_discovery/data.py') }}
          restore-keys: site-input-data-${{ runner.os }}-

      - name: Overlay submission data onto trusted checkout
        run: uv run --with-editable . python scripts/apply_pr_models_overlay.py pr-tree

      - name: Detect submitted models
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          LABELED_SHA: ${{ github.event.pull_request.head.sha }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          CHANGED=$(gh pr diff "$PR" --repo "$GITHUB_REPOSITORY" --name-only)
          LIVE_HEAD=$(gh pr view "$PR" --repo "$GITHUB_REPOSITORY" \
            --json headRefOid -q .headRefOid)
          if [ "$LIVE_HEAD" != "$LABELED_SHA" ]; then
            echo "::error::PR #$PR head moved since the ingest-model label was applied. Review the new commits and re-apply the label."
            exit 1
          fi

          FORMAT_CHANGED=$(grep -E '^(scripts/model_figs/.*\.py|scripts/evals/(geo_opt|md|diatomic_metrics)\.py|scripts/ingest_model\.py|matbench_discovery/(figs\.py|metrics/(md\.py|diatomics/.*\.py)))$' <<< "$CHANGED" || true)
          if [ -n "$FORMAT_CHANGED" ]; then
            echo "::error::This PR changes payload-generating code. Regenerate locally with 'uv run --with-editable . scripts/ingest_model.py --payloads-only' and commit the payloads; this secret-bearing workflow never executes PR code."
            exit 1
          fi

          CHANGED_YML=$(grep -E '^models/.*\.yml$' <<< "$CHANGED" | grep -v model-schema || true)
          if [ -z "$CHANGED_YML" ]; then
            echo "::error::No model YAML changes found in PR #$PR"
            exit 1
          fi
          # word splitting of the newline-separated paths is intended
          # shellcheck disable=SC2086
          MODELS=$(uv run --with-editable . python \
            scripts/ingest_model.py --map-yaml-paths $CHANGED_YML)
          if [ -z "$MODELS" ]; then
            echo "::error::No submitted models detected"
            exit 1
          fi
          echo "models=$MODELS" >> "$GITHUB_OUTPUT"
          echo "Detected submitted models: $MODELS"

      # Restore after overlay so model prediction artifacts never cross submissions.
      - name: Cache model prediction + analysis files
        uses: actions/cache@v5
        with:
          path: |
            models/**/*.csv.gz
            models/**/*.json.gz
            models/**/*.jsonl.gz
          key: model-preds-${{ hashFiles('models/**/*.yml') }}

      - name: Ingest submitted models
        env:
          FIGSHARE_TOKEN: ${{ secrets.FIGSHARE_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODELS: ${{ steps.detect.outputs.models }}
        run: |
          for model in $MODELS; do
            uv run --with-editable . scripts/ingest_model.py "$model" --archive
          done

      - name: Copy generated artifacts into the PR checkout
        run: |
          rsync -a --include='*/' --include='*.yml' --exclude='*' \
            models/ pr-tree/models/
          rsync -a --delete site/src/figs/ pr-tree/site/src/figs/
          rsync -aR site/src/lib/parity/*-parity-manifest.ts \
            site/static/*-parity/manifest.json \
            site/src/routes/models/per-element-each-errors.jsonl pr-tree/

      - name: Commit updated assets to the PR
        env:
          GH_TOKEN: ${{ secrets.SITE_FIGS_PAT }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::secrets.SITE_FIGS_PAT is not set"
            exit 1
          fi
          cd pr-tree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models site/src/figs site/src/lib site/src/routes/models \
            site/static/energy-parity/manifest.json \
            site/static/kappa-parity/manifest.json
          if git diff --cached --quiet; then
            echo "Everything already up to date - nothing to commit"
            exit 0
          fi
          SUMMARY=$(python3 ../scripts/summarize_payload_changes.py)
          git commit --no-verify \
            -m "Ingest model submission: archive pred files + refresh site assets" \
            -m "$SUMMARY"
          git push --no-verify \
            "https://x-access-token:${GH_TOKEN}@github.com/${HEAD_REPO}.git" \
            "HEAD:${HEAD_REF}"
