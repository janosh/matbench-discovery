name: Update site figures

# Keep site figure payloads (site/src/figs) in sync with model submissions. Two modes:
#
# 1. Ingest (maintainer labels a submission PR 'ingest-model'): run `just ingest-model`
#    per new model (evals + checklist, archive the author's pred files to the project's
#    figshare, publish parity assets to the GH release, refresh payloads) and commit the
#    results onto the PR branch, so one merge lands the model fully integrated.
#    SECURITY: PR code is never executed. The job runs trusted main and overlays only PR
#    *data* via scripts/apply_pr_models_overlay.py - models/** plus enums.py iff its diff
#    is provably additive Model members (else fails closed -> a maintainer runs
#    `just ingest-model` locally after review). That's why FIGSHARE_TOKEN (account-wide!)
#    + WANDB_API_KEY are safe here; the label is a cost gate, not a security boundary.
#    Requires the label, secrets.SITE_FIGS_PAT (classic PAT with public_repo scope;
#    fine-grained PATs can't push to fork branches; the PR's "allow edits by maintainers"
#    must stay on) and secrets.FIGSHARE_TOKEN. Re-trigger by re-applying the label.
#
# 2. Fallback (push to main touching model YAMLs, or weekly): regenerate payloads and
#    open a follow-up PR only if they differ. No-op when already current.
on:
  pull_request_target:
    types: [labeled]
  push:
    branches: [main]
    paths: [models/**/*.yml] # new/updated model submissions
  schedule:
    - cron: 17 4 * * 1 # weekly safety net (Mon 04:17 UTC)
  workflow_dispatch:

permissions:
  contents: write # push release assets; create fallback-PR branches
  pull-requests: write
  actions: write # dispatch CI workflows on the fallback auto-PR branch

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  update-site-figs:
    if: github.event_name != 'pull_request_target' || github.event.label.name == 'ingest-model'
    runs-on: ubuntu-latest
    timeout-minutes: 150 # downloads every model's preds on a cold cache
    steps:
      # always the trusted ref (main); ingest-mode PR content is overlaid as data, never run
      - name: Check out trusted repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # ingest mode: PR head as a data source + later push target (checkout never runs PR code)
      - name: Check out submission PR head (data only)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: pr-tree
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Cache model prediction + analysis files
        uses: actions/cache@v5
        with:
          # figshare downloads land next to each model's YAML (models/**) and in data/
          path: |
            models/**/*.csv.gz
            models/**/*.json.gz
            data/mp
            data/wbm
          key: model-preds-${{ hashFiles('models/**/*.yml') }}
          # partial restore on new submissions: only the new model's files download
          restore-keys: model-preds-

      # === ingest mode: full pipeline on trusted code + overlaid PR data ===
      - name: Overlay submission data onto trusted checkout
        if: github.event_name == 'pull_request_target'
        run: uv run python scripts/apply_pr_models_overlay.py pr-tree

      - name: Detect submitted models
        id: detect
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          CHANGED=$(gh pr diff "$PR" --repo "$GITHUB_REPOSITORY" --name-only |
            grep -E '^models/.*\.yml$' | grep -v model-schema || true)
          if [ -z "$CHANGED" ]; then
            echo "::error::No model YAML changes found in PR #$PR"
            exit 1
          fi
          # word splitting of the newline-separated paths is intended
          # shellcheck disable=SC2086
          MODELS=$(uv run python scripts/ingest_model.py --map-yaml-paths $CHANGED)
          echo "models=$MODELS" >> "$GITHUB_OUTPUT"
          echo "Detected submitted models: $MODELS"

      - name: Ingest submitted models
        if: github.event_name == 'pull_request_target'
        env:
          # safe to expose: only trusted main code executes in this job (see header)
          FIGSHARE_TOKEN: ${{ secrets.FIGSHARE_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          GH_TOKEN: ${{ github.token }} # gh release upload of parity assets
          MODELS: ${{ steps.detect.outputs.models }} # env (not inline) per injection-hardening guidance
        run: |
          if [ -z "$MODELS" ]; then
            echo "::error::Detect step produced no models - refusing to no-op silently"
            exit 1
          fi
          for model in $MODELS; do
            just ingest-model "$model"
          done

      # Copy generated artifacts into the PR checkout and push from there, preserving the
      # contributor's other changes. The maintainer PAT (not GITHUB_TOKEN) is needed to
      # push to forks and to trigger pull_request CI on the new SHA; gitignore keeps
      # downloaded pred files out of the commit.
      - name: Commit ingested changes to the submission PR
        if: github.event_name == 'pull_request_target'
        env:
          GH_TOKEN: ${{ secrets.SITE_FIGS_PAT }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::secrets.SITE_FIGS_PAT is not set (classic PAT with public_repo scope needed to push to fork branches)"
            exit 1
          fi
          # model YAMLs (archived URLs + metrics) and regenerated site assets. --delete on
          # the figs dir so renamed/removed payloads don't linger (the generators fully own
          # it). Multi-model payloads are single <name>.jsonl files, including per-element.
          rsync -a --include='*/' --include='*.yml' --exclude='*' models/ pr-tree/models/
          rsync -a --delete site/src/figs/ pr-tree/site/src/figs/
          for file in site/src/lib/energy-parity-manifest.ts \
                      site/src/lib/kappa-parity-manifest.ts \
                      site/src/routes/models/per-element-each-errors.jsonl; do
            cp "$file" "pr-tree/$file"
          done
          cd pr-tree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add models site/src/figs site/src/lib site/src/routes/models
          if git diff --cached --quiet; then
            echo "Everything already up to date - nothing to commit"
            exit 0
          fi
          git commit -m "Ingest model submission: archive pred files + refresh site assets"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${HEAD_REPO}.git" "HEAD:${HEAD_REF}"

      # === fallback mode: refresh payloads, follow-up PR only when they differ ===
      - name: Regenerate site figure payloads
        if: github.event_name != 'pull_request_target'
        run: just update-site-figs

      # diff each regenerated .jsonl payload's model roster against the committed (HEAD)
      # one so the PR body lists which payloads grew and which models were added. Payloads
      # are line-delimited (one model per line, a lone _base line for shared fields), so
      # the roster is the set of model ids inside each file
      - name: Summarize payload model-count changes
        id: payload_diff
        if: github.event_name != 'pull_request_target'
        run: |
          {
            echo "model_counts<<PR_BODY_EOF"
            uv run python scripts/summarize_payload_changes.py
            echo "PR_BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR with updated payloads
        id: cpr
        if: github.event_name != 'pull_request_target'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            site/src/figs
            site/src/routes/models/per-element-each-errors.jsonl
          commit-message: Update multi-model site figure payloads
          title: Update multi-model site figure payloads
          body: |
            Auto-generated by the [`${{ github.workflow }}` workflow](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/.github/workflows/update-site-figs.yml) after changes to
            `models/**/*.yml` ([CI run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})).

            Payload shapes were validated by [`tests/test_fig_payloads.py`](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/tests/test_fig_payloads.py) before
            this PR was opened; the required checks ([test.yml](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/.github/workflows/test.yml)) and the site build
            ([gh-pages.yml](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/.github/workflows/gh-pages.yml)) are dispatched onto this branch by the same workflow run.

            ${{ steps.payload_diff.outputs.model_counts }}
          branch: auto/update-site-figs
          delete-branch: true

      # GITHUB_TOKEN-opened PRs don't trigger push/pull_request workflows, but
      # workflow_dispatch is exempt. Dispatch the required checks (all four in test.yml) and
      # the site build (gh-pages.yml builds without deploying off-main) onto the PR head
      # so branch protection is satisfied.
      - name: Trigger CI on the fallback auto-PR
        if: github.event_name != 'pull_request_target' && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run test.yml --ref auto/update-site-figs
          gh workflow run gh-pages.yml --ref auto/update-site-figs
