doi: https://doi.org/10.48550/arXiv.2601.07742
paper: https://arxiv.org/abs/2601.07742
docs: https://github.com/atomicarchitects/nequix
pr_url: https://github.com/janosh/matbench-discovery/pull/304
checkpoint_url: https://figshare.com/files/60965527
license:
  code: MIT
  code_url: https://github.com/atomicarchitects/nequix/blob/main/LICENSE
  checkpoint: CC-BY-4.0
  checkpoint_url: https://creativecommons.org/licenses/by/4.0/

environment:
  dependencies:
    - nequix
    - 'jax[cuda12]'
    - e3nn-jax==0.20.7
    - jraph==0.0.6.dev0
    - equinox==0.11.11
    - optax==0.2.5
    - ase==3.24.0
    - tqdm==4.67.1
    - wandb==0.19.11
    - pyyaml==6.0.2
    - matscipy==1.1.1
    - h5py==3.14.0
    - wandb-osh==1.2.2
    - cloudpickle==3.1.1
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFSH_G
training_sets: [MPtrj, MDR-MP PBE ω_q]
fine_tune: true
model_params: 707658
training_cost:
  entries:
    - hardware: NVIDIA A100
      count: 1
      hours_per_device: 140.0
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      max_steps: 500
      force_max: 0.02
      save_forces: true
  architecture:
    graph_construction_radius: 6.0
  training:
    learning_rate: 0.0001
    batch_size: 16
    epochs: 100
    optimizer: AdamW
  upstream_config:
    hidden_irreps: 128x0e+64x1o+32x2e+32x3o
    lmax: 3
    radial_basis_size: 8
    radial_mlp_size: 64
    radial_mlp_layers: 2
    radial_polynomial_p: 6.0
    layer_norm: true
    weight_decay: 0.001
    grad_clip_norm: 100
    loss:
      energy: mae
      force: l2
      stress: mae
      hessian: mae
    loss_weights:
      energy: 0.0
      force: 20.0
      stress: 5.0
      hessian: 100.0
    cotrain_loss_weights:
      energy: 500.0
      force: 200.0
      stress: 50.0
    ema_decay: 0.999
notes:
  description: Nequix MP PFT is a fine-tuned version of Nequix MP 1, which was fine-tuned using phonon fine-tuning (PFT) on a subset of the MDR Phonon PBE dataset that is contained within MPtrj.
  reproduction: |
    git clone https://github.com/atomicarchitects/nequix && cd nequix
    uv sync --extra pft
    bash data/download_pbe_mdr_preprocessed.sh
    uv run nequix/pft/train.py configs/nequix-mp-1-pft.yml

