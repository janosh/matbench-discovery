environment:
  dependencies:
  - 'fairchem-core[torch-extras]==1.10.0'
  - torch==2.4.0
  - numpy<2
  - scipy<1.15
  python_version: '3.12'
  find_links: ['https://data.pyg.org/whl/torch-2.4.0+cu121.html']
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj, OMat24, sAlex]
size: 30M
model_params: 30161153
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
  architecture:
    graph_construction_radius: 6.0
notes:
  description: |
    equivariant Smooth Energy Network (eSEN), described in https://arxiv.org/abs/2502.12147.
  training: |
    Training was done by: (1) 2-epoch direct pre-training on OMat24; (2) 2-epoch conservative fine-tuning on OMat24; (3) 1-epoch conservative fine-tuning on MPtrj+sAlex.

