  checkpoint: MIT
  checkpoint_url: https://github.com/ACEsuit/mace-foundations/blob/1ff8786eb/LICENSE

environment:
  dependencies:
    - mace-torch>=0.3.16
    - cuequivariance
    - cuequivariance-torch
    - cuequivariance-ops-torch-cu12
    - torch==2.5.1
    - ase==3.23.0
    - pymatgen==2024.11.13
    - numpy==1.26.4
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj, sAlex]
model_params: 9063204
hyperparams:
  evaluation:
    max_force: 0.05
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      save_forces: true
  architecture:
    graph_construction_radius: 6.0

notes:
  description: |
    MACE is a higher-order equivariant message-passing neural network for fast and accurate force fields.
  training: Using model pre-trained on MPTraj and Alexandria.

