environment:
  dependencies:
  - 'fairchem-core[torch-extras]==1.10.0'
  - torch==2.4.0
  - numpy<2
  - scipy<1.15
  - ase==3.25.0
  - ase-db-backends==0.10.0
  - e3nn==0.5.6
  - tqdm==4.67.1
  - wandb==0.21.0
  - pyyaml==6.0.2
  python_version: '3.12'
  find_links: ['https://data.pyg.org/whl/torch-2.4.0+cu121.html']
openness: OSOD
architecture_types: [transformer]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj]
model_params: 30278113
training_cost:
  entries:
  - hardware: NVIDIA H100
    count: 16
    hours_per_device: 66.875
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      save_forces: true
  architecture:
    graph_construction_radius: 6.0
  upstream_config:
    num_blocks: 7
    lmax: 4
    mmax: 2
    embedding_dimension: 128
    attention_value_hidden_size: 32
    num_attention_heads: 8
    attention_alpha_hidden_size: 64
    attention_value_size_per_head: 16
    ffn_hidden_size_after_swiglu_s2_activation: 512
    grid_resolution_attention: (14, 8)
    grid_resolution_ffn: (14, 14)
    DeNS_probability: 0.5
    DeNS_coefficient: 10
    DeNS_noise_std: 0.025
    DeNS_corruption_ratio: 0.5
notes:
  description: EquiformerV3 is the third generation of SE(3)-equivariant graph attention Transformers. Please refer to our paper for more details.


