hyperparams:
  max_force: 0.02
  max_steps: 500
  ase_optimizer: FIRE
  cell_filter: FrechetCellFilter
  graph_construction_radius: 6.0
  max_neighbors: .inf

  num_blocks: 7
  lmax: 4
  mmax: 2
  embedding_dimension: 128
  attention_value_hidden_size: 32
  num_attention_heads: 8
  attention_alpha_hidden_size: 64
  attention_value_size_per_head: 16
  ffn_hidden_size_after_swiglu_s2_activation: 512
  grid_resolution_attention: (14, 8)
  grid_resolution_ffn: (14, 14)

  DeNS_probability: 0.5
  DeNS_coefficient: 1
  DeNS_noise_std: 0.025
  DeNS_corruption_ratio: 0.5
  DeNS_max_force_norm: 2.5


notes:
  Description: EquiformerV3 is the third generation of SE(3)-equivariant graph attention Transformers. Please refer to our paper for more details.


