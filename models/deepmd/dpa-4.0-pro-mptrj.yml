openness: OSOD
trained_for_benchmark: true
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
model_type: UIP
model_params: 32_724_908
n_estimators: 1

training_set: [MPtrj]

training_cost:
  Nvidia H20 GPUs: {amount: 8, hours: 288, cost: 2304}  # cost in USD

hyperparams:
  # Matbench Discovery relaxation settings used for the submitted WBM IS2RE results.
  max_force: 0.02
  max_steps: 500
  ase_optimizer: FIRE
  cell_filter: FrechetCellFilter
  graph_construction_radius: 6.0
  max_neighbors: 384

  architecture:
    type: DPA4/SeZM
    n_blocks: 8
    lmax: 5
    mmax: 1
    channels: 96
    n_radial: 16
    so2_layers: 4
    radial_so2_mode: none
    radial_so2_rank: 0
    n_focus: 1
    n_atten_head: 1
    ffn_blocks: 1
    sandwich_norm: [true, false, true, false]
    s2_activation: [false, true]
    lebedev_quadrature: false
    activation_function: silu
    glu_activation: true
    precision: float32

  learning_rate_schedule:
    type: WSD

  loss:
    loss_func: mae
    f_use_norm: true
    loss_prefactor:
      energy: 20
      force: 20
      virial: 5

  optimizer: Muon
  weight_decay: 0.001

  training:
    numb_steps: 3_000_000
    batch_size: 500
    gradient_max_norm: 5

requirements:
  deepmd-kit: 3.1.4
  torch: 2.11.0+cu128
  ase: 3.28.0

notes:
  Description: |
    DPA-4.0-Pro-MPtrj is a DeePMD-kit universal interatomic potential in the
    DPA4/SeZM architecture family, trained only on the MPtrj dataset for this
    Matbench Discovery submission.
  Architecture: |
    DPA4 uses local-frame SO(2)-equivariant message passing with envelope-gated
    attention over invariant channels. The submitted model has 8 interaction
    blocks, lmax=5, mmax=1, 96 channels, 16 radial basis functions, and a
    6.0 Å cutoff with up to 384 selected neighbors.
  Training: |
    The model was trained for 3,000,000 steps using the Muon optimizer, WSD
    learning-rate schedule, MAE energy/force/virial loss weights 20/20/5,
    with AMP, TF32, and compile enabled.

