openness: OSOD
trained_for_benchmark: true
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
model_type: UIP
model_params: 32_724_908
n_estimators: 1

training_set: [MPtrj]

# TODO: replace with actual training hardware and wall time if available.
training_cost: missing
# Example:
# training_cost:
#   Nvidia H20 GPUs: {amount: 8, hours: 120}

hyperparams:
  # Matbench Discovery relaxation settings used for the submitted WBM IS2RE results.
  max_force: 0.02
  max_steps: 500
  ase_optimizer: FIRE
  cell_filter: FrechetCellFilter
  graph_construction_radius: 6.0
  max_neighbors: 384

  architecture:
    type: DPA4
    n_blocks: 8
    lmax: 5
    mmax: 1
    channels: 96
    n_radial: 16
    so2_layers: 4
    n_focus: 1
    n_atten_head: 1
    ffn_blocks: 1
    sandwich_norm: [true, false, true, false]
    s2_activation: [false, true]
    activation_function: silu
    glu_activation: true
    use_amp: true
    use_compile: true
    enable_tf32: true
    precision: float32

  learning_rate:
    type: wsd
    start_lr: 0.00043
    stop_lr: 0.000001
    warmup_steps: 5000
    warmup_start_factor: 0.2
    decay_phase_ratio: 0.65
    decay_type: cosine

  loss:
    type: ener
    loss_func: mae
    f_use_norm: true
    loss_weights:
      energy: 20
      force: 20
      virial: 5

  optimizer:
    type: Muon
    weight_decay: 0.001

  training:
    numb_steps: 3_000_000
    batch_size: filter:500
    gradient_max_norm: 5

requirements:
  deepmd-kit: 3.1.4.dev113+g0efbbb53c
  torch: 2.11.0+cu128
  numpy: 2.4.4
  pandas: 2.3.3
  ase: 3.28.0
  pymatgen: 2026.3.23
  moyopy: 0.7.9
  phono3py: 3.30.1
  phonopy: 3.5.0
  k_srme: 1.0.0

notes:
  Description: |
    DPA-4.0-Pro-MPtrj is a DeePMD-kit universal interatomic potential trained
    on the MPtrj dataset.
  Architecture: |
    The model uses the DPA4 architecture with 8 blocks, lmax=5, mmax=1,
    96 channels, 16 radial basis functions, and a 6.0 Å cutoff with up to
    384 selected neighbors.
  Training: |
    The model was trained for 3,000,000 steps using the Muon optimizer, WSD
    learning-rate schedule, MAE energy/force/virial loss weights 20/20/5,
    with AMP, TF32, and compile enabled.

