environment:
  dependencies: ['deepmd-kit[torch]==3.2.0b0', 'torch==2.11.0+cu128', 'ase==3.28.0']
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj]
model_params: 32724908
training_cost:
  entries:
  - hardware: NVIDIA H20
    count: 8
    hours_per_device: 288.0
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      save_forces: true
  architecture:
    graph_construction_radius: 6.0
    max_neighbors: 384
  training:
    optimizer: Muon
  upstream_config:
    architecture:
      type: DPA4/SeZM
      n_blocks: 8
      lmax: 5
      mmax: 1
      channels: 96
      n_radial: 16
      so2_layers: 4
      radial_so2_mode: none
      radial_so2_rank: 0
      n_focus: 1
      n_atten_head: 1
      ffn_blocks: 1
      sandwich_norm: [true, false, true, false]
      s2_activation: [false, true]
      lebedev_quadrature: false
      activation_function: silu
      glu_activation: true
      precision: float32

    learning_rate_schedule:
      type: WSD

    loss:
      loss_func: mae
      f_use_norm: true
      loss_prefactor:
        energy: 20
        force: 20
        virial: 5

    weight_decay: 0.001
    training:
      numb_steps: 3000000
      batch_size: 500
      gradient_max_norm: 5

notes:
  description: |
    DPA-4.0-Pro-MPtrj is a DeePMD-kit universal interatomic potential in the
    DPA4/SeZM architecture family, trained only on the MPtrj dataset for this
    Matbench Discovery submission.
  architecture: |
    DPA4 uses local-frame SO(2)-equivariant message passing with envelope-gated
    attention over invariant channels. The submitted model has 8 interaction
    blocks, lmax=5, mmax=1, 96 channels, 16 radial basis functions, and a
    6.0 Å cutoff with up to 384 selected neighbors.
  training: |
    The model was trained for 3,000,000 steps using the Muon optimizer, WSD
    learning-rate schedule, MAE energy/force/virial loss weights 20/20/5,
    with AMP, TF32, and compile enabled.

