openness: OSOD
trained_for_benchmark: true
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
model_type: UIP
model_params: 22808191
n_estimators: 1

training_set: [MPtrj]

training_cost:
  Nvidia H20 GPUs: {amount: 16, hours: 135}

hyperparams:
  # Matbench Discovery relaxation settings used for the submitted WBM IS2RE results.
  max_force: 0.02
  max_steps: 500
  ase_optimizer: FIRE
  cell_filter: FrechetCellFilter
  graph_construction_radius: 6.0 # cutoff radius in Å
  max_neighbors: 384

  # Model parameters
  architecture:
    type: DPA4/SeZM
    feature_dim: 64
    n_focuses: 2
    n_layers: 6
    so2_layers: 4
    ffn_layers: 2
    radial_basis: Bessel
    n_radial_basis: 16
    lmax: 5
    mmax: 1
    edge_node_product: "degree mixing"
    per_channel_modulation: true
    rank: 2
    attention_heads: 1
    s2_activation: "FFN only"
    quadrature: Lebedev
    norm_placement: "Post & Pre"
    activation_function: SiLU
    ffn_hidden_dim: auto
    output_fitting_dim: auto
    output_fitting_layers: 1
    precision: float32

  # Training parameters
  training:
    optimizer: HybridMuon
    muon_mode: slice
    magma_lite: true
    weight_decay: 1.0e-3
    lr_scheduler: WSD
    max_lr: 5.0e-4
    min_lr: 1.0e-6
    warmup_steps: 5000
    decay_ratio: 0.65
    decay_type: cosine
    loss: MAE
    loss_weights: {energy: 20, force: 20, virial: 5}
    batch_size_per_gpu: "filter:300"
    training_steps: 2000000
    gradient_max_norm: 5
    n_gpus: 16
    compile: true
    bf16_amp: true
    tf32_matmul: true

requirements:
  deepmd-kit: 3.2.0
  torch: 2.11.0+cu128
  ase: 3.28.0

notes:
  Description: |
    DPA-4.0.1-Pro-MPtrj is the DPA4-Pro universal interatomic potential trained
    only on the MPtrj dataset for this Matbench Discovery submission.
  Architecture: |
    DPA4 is an SE(3)-equivariant potential built on an EMFA (Edge-conditioned,
    Multi-Focus, Attention) SO(2)-equivariant convolution: a low-rank edge-node
    SO(2)-equivariant product, a multi-focus design for message nonlinearity,
    and envelope-gated attention for message aggregation, with a Lebedev-grid
    projection that preserves SO(3)-equivariance in the nonlinearity.
  Training: |
    The model was trained for 2,000,000 steps on 16 GPUs using the HybridMuon
    optimizer, WSD learning-rate schedule, MAE energy/force/virial loss weights
    20/20/5, with bf16 AMP, TF32 matmul, and torch compile enabled.

