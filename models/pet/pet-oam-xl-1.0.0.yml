url: https://github.com/lab-cosmo/upet
doi: https://doi.org/10.1038/s41467-025-65662-7
paper: https://www.nature.com/articles/s41467-025-65662-7
pr_url: https://github.com/janosh/matbench-discovery/pull/303

openness: OSOD
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
model_type: Transformer
model_params: 730000000
trained_for_benchmark: true
n_estimators: 1

license:
  checkpoint: BSD-3-Clause
  code: BSD-3-Clause
  code_url: https://github.com/lab-cosmo/upet/blob/main/LICENSE

hyperparams:
  max_force: 0.02
  max_steps: 500
  ase_optimizer: FIRE
  cell_filter: FrechetCellFilter
  d_pet: 640
  d_node: 2560
  d_feedforward: 1280
  d_head: 640
  num_gnn_layers: 5
  num_attention_layers: 3
  cutoff: 10.0
  num_neighbors_adaptive: 40
  cutoff_width: 0.5
  cutoff_function: Bump

training_cost:
  Nvidia H100 GPUs: {amount: 512, hours: 40}

requirements:
  upet: '0.1.0'

training_set: [OMat24, sAlex, MPtrj]

