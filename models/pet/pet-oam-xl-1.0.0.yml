license:
  checkpoint: BSD-3-Clause
  code: BSD-3-Clause
  code_url: https://github.com/lab-cosmo/upet/blob/main/LICENSE

environment:
  dependencies: ['upet==0.1.0', metatomic-ase]
  python_version: '3.12'
openness: OSOD
architecture_types: [transformer]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj, OMat24, sAlex]
model_params: 730000000
training_cost:
  entries:
  - hardware: NVIDIA H100
    count: 512
    hours_per_device: 40.0
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      is_plusminus: true
      save_forces: true
  upstream_config:
    d_pet: 640
    d_node: 2560
    d_feedforward: 1280
    d_head: 640
    num_gnn_layers: 5
    num_attention_layers: 3
    cutoff: 10.0
    num_neighbors_adaptive: 40
    cutoff_width: 0.5
    cutoff_function: Bump
