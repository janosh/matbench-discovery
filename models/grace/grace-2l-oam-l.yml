environment:
  dependencies:
    - tensorpotential
    - tensorflow==2.16.2
    - ase==3.26.0
    - pymatgen==2023.7.14
    - numpy==2.3.2
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EF
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj, OMat24, sAlex]
model_params: 26394284
hyperparams:
  evaluation:
    max_force: 0.03
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      force_max: 0.00001
      relaxation_mode: two-stage
  architecture:
    graph_construction_radius: 6.0

