environment:
  dependencies:
    - tensorpotential @ git+https://github.com/ICAMS/grace-tensorpotential@3115a9314
    - plotly
    - tensorflow==2.16.2
    - ase==3.23.0
    - pymatgen==2023.7.14
    - numpy==1.26.4
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EF
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj]
model_params: 15346704
hyperparams:
  evaluation:
    max_force: 0.03
    max_steps: 300
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
  architecture:
    graph_construction_radius: 6.0

