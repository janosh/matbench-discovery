environment:
  dependencies:
  - alphanet @ git+https://github.com/zmyybc/AlphaNet
  - torch==2.5.1
  - torch-geometric==2.6.1
  - torch-scatter
  - numpy<2
  - ase==3.24.0
  - pymatgen==2024.6.10
  python_version: '3.12'
  find_links: ['https://data.pyg.org/whl/torch-2.5.1+cu121.html']
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: ['MPtrj', 'OMat24', 'sAlex']
model_params: 4653577
hyperparams:
  evaluation:
    max_force: 0.03
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
  architecture:
    n_layers: 4
    graph_construction_radius: 5.0
    max_neighbors: 50
  training:
    batch_size: 256
    initial_learning_rate: 0.0002
    epochs: 4
    optimizer: Adam
  upstream_config:
    loss: MAE
    loss_weights:
      energy: 4.0
      force: 100.0
      stress: 10
    learning_rate_schedule: StepLR(decay_steps=10000, decay_ratio = 0.93)
    n_hidden_channels: 176
    n_bessel_basis: 8
    n_heads: 24
notes:
  description: |
    AlphaNet is a local frame-based equivariant model designed to tackle the challenges of achieving both accurate and efficient simulations for atomistic systems. AlphaNet enhances computational efficiency and accuracy by leveraging the local geometric structures of atomic environments through the construction of equivariant local frames and learnable frame transitions.
    # We changed the RBF function and used a small size model in this version.
