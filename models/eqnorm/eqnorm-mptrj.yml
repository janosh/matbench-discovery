environment:
  dependencies:
  - eqnorm @ git+https://github.com/yzchen08/eqnorm
  - torch==2.2.2
  - torch-geometric==2.6.1
  - torch-scatter
  - vesin==0.3.2
  - numpy<2
  - ase==3.24.0
  - e3nn==0.5.6
  - pymatgen==2025.3.10
  - wget==3.2
  python_version: '3.12'
  find_links: ['https://data.pyg.org/whl/torch-2.2.2+cu121.html']
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj]
model_params: 1310024
training_cost:
  entries:
  - hardware: NVIDIA A100
    count: 4
    hours_per_device: 500.0
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      max_steps: 500
      save_forces: true
  architecture:
    n_layers: 4
    graph_construction_radius: 6.0
  training:
    epochs: 100
    optimizer: AdamW
  upstream_config:
    loss: Huber
    loss_weights:
      energy: 20.0
      force: 20.0
      stress: 320.0
    weight_decay: 0.001
    clip_grad_norm: 100
    ema_decay: 0.999
    max_learning_rate: 0.01
    min_learning_rate: 0.000001
    learning_rate_schedule: warmcosine
    warmup_factor: 0.2
    batch_train: 128
    num_embedding_features: 128
    num_bessel_basis: 8
    invariant_layers: 2
    invariant_neurons: 64
    poly_p: 6
    irreps_hidden: 128x0e+64x1o+32x2e+32x3o
    irreps_sh: 1x0e+1x1o+1x2e+1x3o
    energy_shift: per_species
    energy_scale: force_rms
    shift_trainable: false
    scale_trainable: false
notes:
  description: |
    eqnorm is a graph neural network model designed for predicting the energy, forces, and stresses of materials.
    The model utilizes a combination of invariant and equivariant layers to effectively capture the symmetries present in material structures.

