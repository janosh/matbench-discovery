environment:
  dependencies:
  - tace @ git+https://github.com/xvzemin/tace@c669bee71c2f157dce80d80e8a8f0a08ddfc124c
  - torch==2.9.1
  - torch-geometric==2.7.0
  - pytorch-lightning==2.5.5
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj, OMat24, sAlex]
model_params: 18779248
training_cost:
  entries:
  - hardware: NVIDIA H100
    count: 8
    hours_per_device: 120.0
hyperparams:
  evaluation:
    max_force: 0.05
    max_steps: 500
    ase_optimizer: GOQN
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      save_forces: true
  architecture:
    graph_construction_radius: 6.0
    n_layers: 5
  training:
    epochs: 4
    initial_learning_rate: 0.004
    optimizer: AdamW
    batch_size: 512
  upstream_config:
    loss_weights:
      energy: 1
      force: 8
      stress: 8
    huber_delta: 0.01
    num_channel: 48
    Lmax: 2
    lmax: 3
    l1l2: l1 <= l2
    correlation: 2
notes:
  description: |
    Based on irreducible Cartesian tensors, described in https://arxiv.org/abs/2509.14961 and https://arxiv.org/abs/2512.16882.
  steps: |
    Training performed by: (1) pre-training on OMat24 (lr-4e-3, loss-1:8:8); (2) fine-tuning on MPtrj+sAlex (lr-1e-4, loss-1:1:2).

