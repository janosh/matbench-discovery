repo: https://github.com/xvzemin/tace
doi: https://doi.org/10.57967/hf/7458
paper: https://arxiv.org/abs/2509.14961
docs: https://github.com/xvzemin/tace
pr_url: https://github.com/janosh/matbench-discovery/pull/353
checkpoint_url: https://huggingface.co/xvzemin/tace-foundations/resolve/main/TACE-OAM-RRA-Preview.pt
license:
  code: MIT
  code_url: https://github.com/xvzemin/tace/blob/main/LICENSE.md
  checkpoint: CC-BY-4.0
  # URL that points to the license file for the model checkpoint, not the checkpoint file itself.
  checkpoint_url: https://creativecommons.org/licenses/by/4.0/legalcode

environment:
  # Exact torch and OEQ versions are test pins, not TACE compatibility bounds.
  dependencies:
  - tace @ git+https://github.com/xvzemin/tace
  - openequivariance==0.6.4
  - torch==2.13
  python_version: '3.13'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj, OMat24, sAlex]
model_params: 213690158
training_cost:
  entries:
  - hardware: NVIDIA H20
    count: 8
    hours_per_device: 330.0
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      save_forces: true
  architecture:
    graph_construction_radius: 6.0
    n_layers: 8
  training:
    epochs: 3
    batch_size: 512
  upstream_config:
    loss_weights:
      energy: 1
      force: 1
      stress: 1
    num_interaction_channel: 64
    num_product_channel: 256
    mmax: 4
    Lmax: 4
    lmax: 4
    l1l2: l1 <= l2
    correlation: 2
notes:
  description: |
    This model is a preview implementation based on Radial Rotary Attention
    and Atomic Cluster Expansion, serving as a precursor to the forthcoming
    official versions of TACE-OAM-RRA and TECE-OAM-RRA.

