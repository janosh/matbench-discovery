environment:
  dependencies:
  - bam-torch @ git+https://github.com/myung-group/BAM-torch@d104dae1e89c5144156c053570de0b49e4606f84
  - torch>=2.5.1
  - ase>=3.26.0
  - pymatgen>=2025.10.7
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj]
model_params: 17294554
hyperparams:
  evaluation:
    max_force: 0.05
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      force_max: 1.0e-4
      symprec: 1.0e-5
      ase_optimizer: FIRE
      ase_filter: FrechetCellFilter
      save_forces: true
  architecture:
    graph_construction_radius: 6.0
    max_neighbors: null
notes:
  description: |
    BAM-MP-core is a universal interatomic potential implemented in the
    BAM-torch codebase and evaluated here on WBM IS2RE-SR structure relaxation,
    discovery, and PhononDB kappa-103 tasks.

