environment:
  dependencies:
  - matris @ git+https://github.com/HPC-AI-Team/MatRIS
  - torch==2.6.0
  - numpy<3
  - ase==3.26.0
  - pymatgen==2025.10.07
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFSM
test_task: IS2RE-SR
targets: EFS_GM
training_sets: [MPtrj]
size: 10M
model_params: 10443505
training_cost:
  entries:
  - hardware: NVIDIA A100
    count: 32
    hours_per_device: 170.0
hyperparams:
  evaluation:
    max_force: 0.05
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      force_max: 0.00001
  architecture:
    n_layers: 10
    graph_construction_radius: 6.0
  training:
    batch_size: 512
    initial_learning_rate: 0.0003
  upstream_config:
    optimizer: AdamW(wd=1e-2)
    loss: MAE/L2MAE
    loss_weights:
      energy: 5.0
      force: 5.0
      stress: 0.1
      magmom: 0.1
    learning_rate_schedule: CosineAnnealingLR(T_max=100)
    three_body_cutoff: 4.5
notes:
  description: |
    MatRIS is a foundation model for materials representation and interaction simulation.

