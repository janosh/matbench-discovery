environment:
  dependencies:
  - torch==2.4.1
  - ase==3.23.0
  - pymatgen==2024.11.23
  - numpy==1.26.4
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFSM
test_task: IS2RE-SR
targets: EFS_GM
training_sets: [MPtrj]
model_params: 5825620
training_cost:
  entries:
  - hardware: NVIDIA A100
    count: 16
    hours_per_device: 120.0
hyperparams:
  evaluation:
    max_force: 0.05
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
  architecture:
    n_layers: 6
    graph_construction_radius: 6.0
  training:
    batch_size: 160
    initial_learning_rate: 0.0003
    epochs: 30
    optimizer: Adam
  upstream_config:
    loss: MAE
    loss_weights:
      energy: 5.0
      force: 5.0
      stress: 0.1
      magmom: 0.1
    learning_rate_schedule: CosineAnnealingLR(T_max=300)
    n_features: 128
    n_radial_bessel_basis: 7
    three_body_cutoff: 4.0
notes:
  description: |
    MatRIS is a foundation model for materials representation and interaction simulation.

