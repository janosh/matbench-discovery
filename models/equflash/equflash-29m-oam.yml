environment:
  dependencies: ['torch==2.8.0+cu126', 'cuEquivariance==0.6.0', 'fairchem-core==1.10.0']
  python_version: '3.12'
  project: models/equflash/kappa-env
openness: CSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj, OMat24, sAlex]
size: 29M
model_params: 28741188
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      relaxation_mode: two-stage
      max_atoms_per_batch: 128
  architecture:
    graph_construction_radius: 6.0
notes:
  description: |
    EquFlash is an E(3)-equivariant model based on the SevenNet-0 architecture, with tensor products accelerated by FlashTP.
    FlashTP achieves up to 41.6× and 60.8× kernel speedups over e3nn and NVIDIA cuEquivariance, respectively, while reducing memory usage by 6×.
    Leveraging these gains, we scaled EquFlash to a larger capacity than the original SevenNet-0.
  training: EquFlash, a scaled-up model derived from SevenNet-0 and       accelerated with FlashTP, was pretrained on OMat24 and finetuned on MPtrj and sAlex.

