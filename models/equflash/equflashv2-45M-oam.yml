openness: OSOD # see `Open` enum in matbench_discovery/enums.py
train_task: S2EFS # see `Task` enum in matbench_discovery/enums.py
test_task: IS2RE-SR # see `Task` enum in matbench_discovery/enums.py
targets: EFS_G # see `Targets` enum in matbench_discovery/enums.py
model_type: UIP # see `ModelType` enum in matbench_discovery/enums.py
model_params: 44890492
trained_for_benchmark: true

license:
  code: MIT
  code_url: https://github.com/SamsungDS/GGNN.git
  checkpoint: CC-BY-4.0
  # URL that points to the license file for the model checkpoint, not the checkpoint file itself.
  checkpoint_url: https://figshare.com/ndownloader/files/65435007

hyperparams: # strongly recommended to list relaxation hyperparams
  max_force: 0.02
  max_steps: 500
  ase_optimizer: FIRE
  cell_filter: FrechetCellFilter
  graph_construction_radius: 6.0 # Å
  max_neighbors: .inf # additional hyperparameters describing training and inference

training_cost: # list any hardware used to train the model and for how long
  # hardware: { amount: float, hours: float, cost: float [USD] }
  Nvidia H100 GPUs: {amount: 16, hours: 100}

requirements: # strongly recommended
  torch: 2.9.1
  fairchem-core: 1.10.0
  torch-geometric: 2.6.1
  cuEquivariance: 0.6.0

training_set: [OMat24, MPtrj, sAlex]

notes: # notes can have any key, be multiline and support markdown.
  description: EquFlashV2 is an E(3)-equivariant machine learning force field that adopts a Transformer-style block architecture without attention mechanisms. Instead, it uses Clebsch–Gordan tensor product message passing, efficiently enabled by cuEquivariance, together with a bilinear gate activation for equivariant feature interactions.


