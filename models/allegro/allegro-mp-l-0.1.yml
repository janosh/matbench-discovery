doi: https://doi.org/10.5281/zenodo.16980200
paper: https://arxiv.org/abs/2504.16068
docs: https://allegro.readthedocs.io/en/latest/
pr_url: https://github.com/janosh/matbench-discovery/pull/282
checkpoint_url: https://www.nequip.net/models/mir-group/Allegro-MP-L:0.1
license:
  code: MIT
