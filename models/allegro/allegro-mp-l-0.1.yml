  checkpoint: CC-BY-4.0
  checkpoint_url: https://creativecommons.org/licenses/by/4.0/legalcode

environment:
  dependencies: ['nequip>=0.14', 'allegro>=0.7.1', 'torch<2.10']
  python_version: '3.12'
openness: OSOD
architecture_types: [gnn]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
training_sets: [MPtrj]
size: L
model_params: 18700000
training_cost:
  entries:
    - hardware: NVIDIA H100
      count: 8
      hours_per_device: 50.0
hyperparams:
  evaluation:
    max_force: 0.05
    max_steps: 500
    ase_optimizer: GOQN
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      displacement_distance: 0.03
      save_forces: true
  architecture:
    graph_construction_radius: 6.0
    n_layers: 5
  training:
    batch_size: 520
    initial_learning_rate: 0.01
    epochs: 250
    optimizer: AdamW
  upstream_config:
    weight_decay: 1e-3
    sph_harmonics_l_max: 3
    n_features: 96
    parity: false
    zbl_potential: false
    allegro_mlp_depth: 3
    allegro_mlp_width: 1024
    tensor_path_channel_coupling: true
    polynomial_cutoff: 8
    n_radial_bessel_basis: 12
    loss: Huber - delta=0.01 for energy, delta=0.1 for stress, stratified delta (0.01, 0.007, 0.004, 0.001) for force
    loss_weights:
      energy: 1.0
      force: 5.0
      stress: 0.01
    gradient_clip_val: 0.015
    learning_rate_schedule: ReduceLROnPlateau - factor=0.5, patience=250, min_lr=1e-6
notes:
  description: Large  'compliant' Allegro foundation potential; see <https://www.nequip.net/models/mir-group/Allegro-MP-L:0.1> for details and <https://arxiv.org/abs/2504.16068> for model/training infrastructure.
  steps: Single training run on MPtrj with specified parameters.

