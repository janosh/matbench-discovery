environment:
  dependencies: ['orb-models==0.4.3', 'pynanoflann @ git+https://github.com/dwastberg/pynanoflann@af434039ae14bedcbb838a7808924d6689274168']
  python_version: '3.12'
openness: OSCD
architecture_types: [transformer]
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_D
training_sets: [MPtrj, Alex]
model_params: 25161727
hyperparams:
  evaluation:
    max_force: 0.02
    max_steps: 500
    ase_optimizer: FIRE
    cell_filter: FrechetCellFilter
    kappa:
      protocol: phonondb-v1
      is_plusminus: true
      save_forces: true
  architecture:
    n_layers: 15
    graph_construction_radius: 10.0
    max_neighbors: 20
  training:
    batch_size: 300
    initial_learning_rate: 0.0003
    optimizer: Adam
  upstream_config:
    loss: MAE
    loss_weights:
      energy: 10.0
      force: 1.0
      stress: 1.0
    learning_rate_schedule: CosineAnnealingLR(T_max=100)
    gradient_clip: 0.5
    ema_decay: 0.999
    features: 256 latent dim, 512 MLP dim
    num_rbfs: 50
notes:
  description: |
    ORB is a pretrained model for atomic simulations. ORB uses a pretrained diffusion model backbone which is fine-tuned on MPtrj + Alexandria.
  data_leakage: |
    Note that the Alexandria dataset contains structure prototypes that overlap with the WBM test set (~97k overlapping prototypes).
    Models trained on this dataset benefit from some amount of train/test leakage, though testing on Orb v2 showed that brief (less than 1 epoch)
    fine-tuning resulted in identical metrics whether fine-tuning on Alexandria or sAlex.

