# Authorized pytest skips for live URL / remote identity checks.
# Guard tests require every network-related skip to cite a registry entry here.

skips:
  data_files.figshare_md5.external_article:
    tests:
      - tests/test_enums.py::test_data_files_md5_matches_figshare
    match_substrings:
      - not in data-files article
    reason: >-
      File is hosted outside the controlled data-files article inventory
      (e.g. mp_trj_json_gz in the original MPtrj article).
    scoped_entries:
      - mp_trj_json_gz

  parity_assets.github_unreachable:
    tests:
      - tests/site/test_parity_assets.py::published_release_assets
    match_substrings:
      - GitHub API unreachable
    reason: Offline local development cannot reach the GitHub API.

  parity_assets.github_rate_limited:
    tests:
      - tests/site/test_parity_assets.py::published_release_assets
    match_substrings:
      - GitHub API rate-limited
    reason: Unauthenticated local runs share GitHub API quota.
