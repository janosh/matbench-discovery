'$schema': http://json-schema.org/draft-07/schema#
title: ModelMetadata

definitions:
  # Shared URL schema for all HTTP(S) URLs
  http_url:
    type: string
    format: uri
    pattern: '^https?://'

  nullable_http_url:
    oneOf:
      - $ref: '#/definitions/http_url'
      - type: 'null'

  # Local path + optional Figshare URL and content checksums
  FileRef:
    type: object
    additionalProperties: false
    required: [name]
    properties:
      name:
        type: string
        minLength: 1
      url:
        $ref: '#/definitions/http_url'
      size:
        type: integer
        minimum: 0
      md5:
        type: string
        pattern: '^[0-9a-f]{32}$'
    dependencies:
      size: [md5]
      md5: [size]

  nullable_file_ref:
    oneOf:
      - $ref: '#/definitions/FileRef'
      - type: 'null'

  # Define a shared schema for authors and trained_by
  person:
    type: object
    additionalProperties: false
    properties:
      name:
        type: string
      affiliation:
        type: string
      email:
        type: string
        format: email
      url:
        $ref: '#/definitions/http_url'
      orcid:
        $ref: '#/definitions/http_url'
      github:
        $ref: '#/definitions/http_url'
      corresponding:
        type: boolean
    required: [name]

  ArchitectureType:
    type: string
    enum: [gnn, transformer, random_forest, fingerprint, bayesian_optimization, unknown]

  TargetType:
    type: string
    enum: [E, EF_G, EF_D, EFS_G, EFSH_G, EFS_D, EFS_GM, EFS_DM]

  KappaSettings:
    type: object
    additionalProperties: false
    properties:
      protocol:
        type: string
        enum: [phonondb-v1]
      displacement_distance:
        type: number
        exclusiveMinimum: 0
      temperatures:
        type: array
        minItems: 1
        maxItems: 1
        items:
          type: number
          enum: [300]
      ase_optimizer:
        type: string
      ase_filter:
        type: [string, 'null']
        enum: [FrechetCellFilter, ExpCellFilter, UnitCellFilter, frechet, exp, none, null]
      max_steps:
        type: integer
        minimum: 0
      force_max:
        type: number
        exclusiveMinimum: 0
      symprec:
        type: number
        exclusiveMinimum: 0
      relax_symprec:
        type: number
        exclusiveMinimum: 0
      enforce_relax_symm:
        type: boolean
      conductivity_broken_symm:
        type: boolean
      is_plusminus:
        type: [boolean, string]
        enum: [true, false, auto]
      batch_size:
        type: integer
        minimum: 1
      max_atoms_per_batch:
        type: [integer, 'null']
        minimum: 1
      relaxation_mode:
        type: string
        enum: [single-stage, two-stage, none]
      save_forces:
        type: boolean
    required: [protocol]

  KappaMetrics:
    type: object
    additionalProperties: false
    properties:
      pred_file:
        $ref: '#/definitions/nullable_file_ref'
      force_file:
        $ref: '#/definitions/nullable_file_ref'
      run_info_file:
        $ref: '#/definitions/nullable_file_ref'
      hardware:
        type: string
      run_time_sec:
        type: number
      max_rss_gb:
        type: number
      max_gpu_mem_gb:
        type: number
      κ_SRME:
        type: number
        minimum: 0
        maximum: 2
      κ_SRE:
        type: number
        minimum: 0
        maximum: 2
    required: ['κ_SRME']

  PhononMetrics:
    type: object
    additionalProperties: false
    properties:
      status: &task_status
        type: string
        enum: [complete, partial, not_available, not_applicable, pending]
      reason: &task_reason
        type: [string, 'null']
      kappa_103:
        $ref: '#/definitions/KappaMetrics'
    allOf: &task_status_reason_rule
      - if:
          properties:
            status:
              enum: [partial, not_available, not_applicable, pending]
          required: [status]
        then:
          properties:
            reason:
              type: string
              minLength: 1

  GeoOptMetrics:
    type: object
    additionalProperties: false
    properties:
      status: *task_status
      reason: *task_reason
      pred_file:
        $ref: '#/definitions/nullable_file_ref'
      symprec=1e-5: &symprec_metrics
        type: object
        additionalProperties: false
        properties:
          rmsd:
            type: number
            minimum: 0
          n_sym_ops_mae:
            type: number
          symmetry_decrease:
            type: number
          symmetry_match:
            type: number
          symmetry_increase:
            type: number
          n_structures:
            type: integer
          analysis_file:
            $ref: '#/definitions/nullable_file_ref'
        required:
          - rmsd
          - n_sym_ops_mae
          - symmetry_decrease
          - symmetry_match
          - symmetry_increase
          - n_structures
      symprec=1e-2: *symprec_metrics
    allOf: *task_status_reason_rule

  DiscoveryMetricsSet:
    type: object
    additionalProperties: false
    properties:
      F1:
        type: number
        minimum: 0
        maximum: 1
      DAF:
        type: number
      Precision:
        type: number
      Recall:
        type: number
      Accuracy:
        type: number
      TPR:
        type: number
      FPR:
        type: number
      TNR:
        type: number
      FNR:
        type: number
      TP:
        type: integer
      FP:
        type: integer
      TN:
        type: integer
      FN:
        type: integer
      MAE:
        type: number
      RMSE:
        type: number
      R2:
        type: number
      missing_preds:
        type: integer
    required:
      - F1
      - DAF
      - Precision
      - Recall
      - Accuracy
      - TPR
      - FPR
      - TNR
      - FNR
      - TP
      - FP
      - TN
      - FN
      - MAE
      - RMSE
      - R2
      - missing_preds

  DiscoveryMetrics:
    type: object
    additionalProperties: false
    properties:
      status: *task_status
      reason: *task_reason
      pred_file:
        $ref: '#/definitions/nullable_file_ref'
      hardware:
        type: string
      run_time_sec:
        type: number
      max_rss_gb:
        type: number
      max_gpu_mem_gb:
        type: number
      full_test_set:
        $ref: '#/definitions/DiscoveryMetricsSet'
      most_stable_10k:
        $ref: '#/definitions/DiscoveryMetricsSet'
      unique_prototypes:
        $ref: '#/definitions/DiscoveryMetricsSet'
    allOf: *task_status_reason_rule

  DiatomicsMetrics:
    type: object
    additionalProperties: false
    properties:
      status: *task_status
      reason: *task_reason
      pred_file:
        $ref: '#/definitions/nullable_file_ref'
      hardware:
        type: string
      run_time_sec:
        type: number
      max_rss_gb:
        type: number
      max_gpu_mem_gb:
        type: number
      excluded_formula_reasons:
        type: object
        additionalProperties:
          type: string
      tortuosity:
        type: number
      energy_diff_flips:
        type: number
      energy_jump:
        type: number
      pbe_wall_dist_mae:
        type: number
      pbe_energy_mae:
        type: number
      pbe_bond_length_error:
        type: number
      pbe_well_depth_error:
        type: number
      pbe_force_mae:
        type: number
      pbe_vib_freq_error:
        type: number
      force_flips:
        type: number
      force_total_variation:
        type: number
      force_jump:
        type: number
    allOf: *task_status_reason_rule

  MdMetrics:
    type: object
    additionalProperties: false
    properties:
      status: *task_status
      reason: *task_reason
      pred_file:
        $ref: '#/definitions/nullable_file_ref'
      hardware:
        type: string
      run_time_sec:
        type: number
      max_rss_gb:
        type: number
      max_gpu_mem_gb:
        type: number
      energy_rmse:
        type: number
      force_rmse:
        type: number
      rdf_error:
        type: number
      adf_error:
        type: number
      vdos_error:
        type: number
      pressure_mae:
        type: number
      pressure_wasserstein:
        type: number
      pressure_error:
        type: number
      # NB: no combined_score -- CMDS is computed on the fly by the site (like CPS)
      # from the stored components, so it can never go stale and stays reweightable
      n_systems:
        type: integer
    allOf: *task_status_reason_rule

  # Define license types from dataset schema
  license_enum:
    type: string
    enum:
      - MIT
      - Apache-2.0
      - CC-BY-4.0
      - CC-BY-SA-4.0
      - CC-BY-NC-4.0
      - GPL-3.0
      - BSD-3-Clause
      - LGPL-3.0
      - Meta Research
      - ASL
      - unreleased
    description: |
      License type:
      - MIT: Massachusetts Institute of Technology
      - CC-BY-4.0: Creative Commons Attribution 4.0 International
      - CC-BY-NC-4.0: Creative Commons Attribution-NonCommercial 4.0 International
      - CC-BY-SA-4.0: Creative Commons Attribution-ShareAlike 4.0 International
      - GPL-3.0: GNU General Public v3.0
      - BSD-3-Clause: Berkeley Software Distribution 3-Clause
      - LGPL-3.0: GNU Lesser General Public License v3.0
      - ASL: Academic Software License
      - unreleased: No license since not released

  Dates:
    type: object
    additionalProperties: false
    required: [benchmark_added, paper_published]
    properties:
      benchmark_added: &nullable_date
        oneOf:
          - type: string
            format: date
          - type: 'null'
      paper_published: *nullable_date

  Environment:
    type: object
    additionalProperties: false
    required: [dependencies, python_version]
    description: >
      Isolated runner / provenance environment. Keyed by model_key (dashes and
      dots mapped to underscores) when loading CALCULATORS specs.
    properties:
      dependencies:
        type: array
        minItems: 1
        items:
          type: string
        description: >-
          uv-installable dependency specs used both as provenance display and as
          the isolated runner environment (e.g. torch==2.6.0, pkg @ git+…).
      python_version:
        type: string
        pattern: '^[0-9]+\.[0-9]+$'
        description: >
          Python version pin for the isolated uv runner (e.g. '3.12'). Use 3.11
          only when a dependency stack requires it (e.g. older torch wheels).
      find_links:
        type: array
        items:
          $ref: '#/definitions/http_url'
      extra_index_urls:
        type: array
        items:
          $ref: '#/definitions/http_url'
      project:
        type: [string, 'null']

  TrainingCostEntry:
    type: object
    additionalProperties: false
    required: [hardware, count, hours_per_device]
    properties:
      hardware:
        type: string
        minLength: 1
        description: Accelerator / device label (e.g. NVIDIA H100).
      count:
        type: integer
        minimum: 1
        description: Number of devices used.
      hours_per_device:
        type: number
        minimum: 0
        description: Wall hours per device. Total device-hours = count × hours_per_device.

  TrainingCost:
    type: object
    additionalProperties: false
    required: [entries]
    description: >
      Reported training hardware/cost. Omit the whole field when unknown —
      do not add a placeholder reason.
    properties:
      entries:
        type: array
        minItems: 1
        items:
          $ref: '#/definitions/TrainingCostEntry'
      reason:
        type: string
        minLength: 1
        description: Optional note about how cost was estimated or aggregated.

  Hyperparams:
    type: object
    additionalProperties: false
    properties:
      evaluation:
        type: object
        additionalProperties: true
        properties:
          max_force:
            type: number
            exclusiveMinimum: 0
            description: Geometry-optimization force convergence threshold in eV/Å.
          force_max:
            type: number
            exclusiveMinimum: 0
          max_steps:
            type: integer
            minimum: 0
          ase_optimizer:
            type: string
          ase_filter:
            type: [string, 'null']
          cell_filter:
            type: string
          kappa:
            $ref: '#/definitions/KappaSettings'
      architecture:
        type: object
        additionalProperties: true
        properties:
          graph_construction_radius:
            type: number
            exclusiveMinimum: 0
            description: Graph construction cutoff radius in Å.
          max_neighbors:
            type: [integer, 'null']
            minimum: 1
            description: Maximum graph neighbors; null means unlimited.
          n_layers:
            type: integer
            minimum: 1
      training:
        type: object
        additionalProperties: true
        properties:
          learning_rate:
            type: number
            exclusiveMinimum: 0
          initial_learning_rate:
            type: number
            exclusiveMinimum: 0
          batch_size:
            type: integer
            minimum: 1
          epochs:
            type: number
            exclusiveMinimum: 0
          optimizer:
            type: string
            description: Canonical optimizer label (Adam, AdamW, Muon, ...).
      upstream_config:
        type: object
        additionalProperties: true

type: object
properties:
  model_name:
    type: string
  model_key:
    type: string
    # canonical /models/<model_key> URL slug: lowercase alphanumeric segments
    # separated by single hyphens or dots (dots keep readable version tokens)
    pattern: '^[a-z0-9]+(?:[.-][a-z0-9]+)*$'
  model_version:
    type: [string, 'null']
    description: Upstream package / checkpoint version label (semver, date, tag, …).
  dates:
    $ref: '#/definitions/Dates'
  lifecycle:
    type: string
    enum: [active, superseded, deprecated, aborted]
  superseded_by:
    type: string
    description: model_key of the newer model replacing this one
  authors:
    type: array
    items:
      $ref: '#/definitions/person'
    minItems: 1
    allOf:
      - if:
          properties:
            '0': {}
          required: ['0']
        then:
          properties:
            '0':
              required: ['email']
  trained_by:
    type: array
    items:
      $ref: '#/definitions/person'
  repo:
    $ref: '#/definitions/nullable_http_url'
  doi:
    $ref: '#/definitions/nullable_http_url'
  paper:
    $ref: '#/definitions/nullable_http_url'
  docs:
    $ref: '#/definitions/nullable_http_url'
    description: Model documentation / homepage URL (not the code repo).
  pypi:
    $ref: '#/definitions/nullable_http_url'
  pr_url:
    $ref: '#/definitions/nullable_http_url'
  checkpoint_url:
    $ref: '#/definitions/nullable_http_url'
  license:
    type: object
    additionalProperties: false
    required: [code, checkpoint]
    properties:
      code:
        $ref: '#/definitions/license_enum'
        description: License for the model code
      code_url:
        $ref: '#/definitions/nullable_http_url'
      code_url_reason:
        type: string
      checkpoint:
        $ref: '#/definitions/license_enum'
        description: License for the model checkpoint
      checkpoint_url:
        $ref: '#/definitions/nullable_http_url'
      checkpoint_url_reason:
        type: string
  environment:
    $ref: '#/definitions/Environment'
  training_sets:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
    description: Dataset keys validated against data/datasets.yml in registry tests.
  size:
    type: string
    description: Optional model-size label (e.g. 10M, L, XL).
  fine_tune:
    type: boolean
    description: Whether this checkpoint is a fine-tune of another training run.
  hyperparams:
    $ref: '#/definitions/Hyperparams'
  notes:
    type: object
    additionalProperties: true
    propertyNames:
      pattern: '^[a-z0-9]+(?:_[a-z0-9]+)*$'
    properties:
      description:
        type: string
      training:
        type: string
      html:
        type: object
        additionalProperties:
          type: string
  model_params:
    type: integer
    minimum: 0
  n_estimators:
    type: integer
    minimum: 2
    description: >
      Ensemble size. Omit for single models (default 1); only set when > 1.
  training_cost:
    $ref: '#/definitions/TrainingCost'
  train_task:
    type: string
    enum: &train_task_enum
      - RP2RE # relaxed prototype to relaxed energy
      - RS2RE # relaxed structure to relaxed energy
      - S2E # structure to energy
      - S2RE # structure to relaxed energy -- CGCNN+P
      - S2EF # structure to energy, force
      - S2EFS # structure to energy, force, stress
      - S2EFSM # structure to energy, force, stress, magmoms
  test_task:
    type: string
    enum: &test_task_enum
      - IP2E # initial prototype to energy
      - IS2E # initial structure to energy
      - IS2RE # initial structure to relaxed energy -- CGCNN+P
      - IS2RE-SR # initial structure to relaxed energy with structure relaxation
  architecture_types:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      $ref: '#/definitions/ArchitectureType'
  targets:
    $ref: '#/definitions/TargetType'
  openness:
    type: string
    enum: [OSOD, OSCD, CSOD, CSCD]
  metrics:
    type: object
    additionalProperties: false
    properties:
      phonons:
        $ref: '#/definitions/PhononMetrics'
      geo_opt:
        $ref: '#/definitions/GeoOptMetrics'
      discovery:
        $ref: '#/definitions/DiscoveryMetrics'
      diatomics:
        $ref: '#/definitions/DiatomicsMetrics'
      md:
        $ref: '#/definitions/MdMetrics'

allOf:
  - if:
      properties:
        lifecycle:
          enum: [superseded]
      required: [lifecycle]
    then:
      required: [superseded_by]

required:
  - authors
  - architecture_types
  - environment
  - checkpoint_url
  - dates
  - doi
  - license
  - lifecycle
  - model_key
  - model_name
  - model_params
  - model_version
  - openness
  - paper
  - pr_url
  - repo
  - targets
  - test_task
  - train_task
  - training_sets

additionalProperties: false
