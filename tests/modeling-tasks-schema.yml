'$schema': http://json-schema.org/draft-07/schema#
title: ModelingTasks

definitions:
  metric_orientation:
    type: object
    additionalProperties: false
    properties:
      higher_is_better:
        type: array
        items:
          type: string
          minLength: 1
      lower_is_better:
        type: array
        items:
          type: string
          minLength: 1

  benchmark_task:
    type: object
    additionalProperties: false
    required: [label, description, metrics]
    properties:
      label:
        type: string
        minLength: 1
      description:
        type: string
        minLength: 1
      metrics:
        $ref: '#/definitions/metric_orientation'
      subtasks:
        type: object
        additionalProperties:
          type: object
          additionalProperties: false
          required: [label, description]
          properties:
            label:
              type: string
              minLength: 1
            description:
              type: string
              minLength: 1

type: object
additionalProperties: false
required: [discovery, geo_opt, phonons, diatomics, md, cps]
properties:
  discovery:
    $ref: '#/definitions/benchmark_task'
  geo_opt:
    $ref: '#/definitions/benchmark_task'
  phonons:
    $ref: '#/definitions/benchmark_task'
  diatomics:
    $ref: '#/definitions/benchmark_task'
  md:
    $ref: '#/definitions/benchmark_task'
  cps:
    type: object
    additionalProperties: false
    required: [label, description, metrics]
    properties:
      label:
        type: string
        minLength: 1
      description:
        type: string
        minLength: 1
      metrics:
        $ref: '#/definitions/metric_orientation'
